<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Tracker</title>

    <!-- TailwindCSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>

    <header class=" mx-auto max-w-[80%] space-y-7">
        <h1 class="text-6xl font-bold text-green-500">Plant Tracker</h1>

        <div class="con-tainer grid grid-cols-3 gap-4">

            <div class="div-1 bg-sky-100 p-4 border-black/50 rounded-xl">
                <p>Total</p>
                <p id="total">0</p>
            </div>

            <div class="div-2 bg-green-100 p-4 border-black/50 rounded-xl">
                <p>Thrive</p>
                <p id="thriving-count">0</p>
            </div>

            <div class="div-3 bg-red-100 p-4 border-black/50 rounded-xl">
                <p>Struggling</p>
                <p id="struggling-count">0</p>
            </div>

        </div>
        <hr class="my-6 border-gray-400 ">
    </header>




    <main class="max-w-[80%] mx-auto ">
        <!-- Buttons container -->
        <div class="mb-5">
            <button class="bg-black text-white px-5 py-2 rounded-md mr-2" id="all-filter-btn">All</button>
            <button class="bg-gray-300 px-5 py-2 rounded-md mr-2" id="thriving-filter-btn">Thriving</button>
            <button class="bg-gray-300 px-5 py-2 rounded-md mr-2" id="struggling-filter-btn">Struggling</button>

        </div>





        <section id="all-cards ">

            <!-- Card -->
            <div
                class="card flex justify-between my-6 py-6 border border-gray-300 rounded-xl shadow-md hover:shadow-xl transition-all duration-300 ease-in-out hover:-translate-y-1  p-4">
                <div class="leftside space-y-6">
                    <!-- part - 01 -->
                    <div>
                        <p class="plantName text-4xl">Plant Name 01</p>
                        <p class="latinName">Latin Name</p>
                    </div>
                    <!-- part 02 -->
                    <div class="flex gap-3">
                        <p class="light bg-gray-200 rounded-md px-3 py-1">Bright Indicate</p>
                        <p class="water bg-gray-200 rounded-md px-3 py-1">Weekly</p>
                    </div>
                    <!-- part 03 -->
                    <div>
                        <p class="status">Not Applicable</p>
                        <p class="notes">New leaf unfurling by the east window.</p>
                    </div>

                    <div class="flex gap-4">
                        <button class="thriving-btn bg-green-200 px-4 py-2 rounded-md">Thrive</button>
                        <button class="struggling-btn bg-red-200 px-4 py-2 rounded-md">Struggle</button>
                    </div>
                </div>


                <div class="rightside">
                    <button class="bg-red-100 px-4 py-2 rounded-md text-red-500">Delete</button>
                </div>
            </div>

        </section>


    </main>









    <script src="script/script.js"></script>
</body>

</html>
